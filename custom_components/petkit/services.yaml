set_feeding_schedule:
  name: Set feeding schedule
  description: >
    Replace the full feeding schedule on a Petkit feeder.
    Each entry in feed_daily_list represents one day of the week (repeats 1-7 = Mon-Sun).
    For dual-hopper feeders (D4S / D4SH), use amount1 and amount2.
    For single-hopper feeders, use amount.
    Time is in seconds since midnight (e.g. 21600 = 06:00, 43200 = 12:00).
  fields:
    device_id:
      name: Device ID
      description: The numeric Petkit device ID of the feeder.
      required: true
      example: 10014481
      selector:
        number:
          min: 1
          mode: box
    feed_daily_list:
      name: Feed daily list
      description: >
        A list of day schedules. Each day has a repeats value (1-7 for Mon-Sun),
        a suspended flag (0=active, 1=suspended), and an items list.
        Each item has: time (seconds since midnight), name (string),
        amount (single hopper), amount1 (hopper 1), amount2 (hopper 2).
      required: true
      example:
        - repeats: 1
          suspended: 0
          items:
            - time: 21600
              name: Breakfast
              amount1: 3
              amount2: 3
            - time: 43200
              name: Lunch
              amount1: 2
              amount2: 2
            - time: 75600
              name: Dinner
              amount1: 5
              amount2: 5
      selector:
        object:

inspect_bluetooth_gatt:
  name: Inspect Bluetooth GATT
  description: >
    Diagnostic-only service that connects to a visible Petkit Bluetooth device
    through Home Assistant Bluetooth, logs its GATT services/characteristics,
    reads readable characteristics, and disconnects. It does not write to the
    device or update entity state.
  fields:
    address:
      name: Bluetooth address
      description: >
        Optional Bluetooth MAC address to inspect. If omitted, the integration
        uses a visible Petkit_W4XUVC advertisement when available.
      required: false
      example: A4:C1:38:60:7E:8E
      selector:
        text:
    local_name:
      name: Local name
      description: >
        Optional exact Bluetooth local name to inspect when address is omitted.
      required: false
      example: Petkit_W4XUVC
      selector:
        text:
    max_read_bytes:
      name: Maximum read bytes
      description: >
        Maximum number of bytes to include in the hex log for each readable
        characteristic. Set to 0 to log only lengths.
      required: false
      default: 128
      selector:
        number:
          min: 0
          max: 1024
          mode: box

listen_bluetooth_notifications:
  name: Listen Bluetooth notifications
  description: >
    Diagnostic-only service that connects to a visible Petkit Bluetooth device,
    reads the AAA1 characteristic, subscribes to AAA1 notifications for a
    bounded duration, logs raw notification payloads, and disconnects. It does
    not write to the device or update entity state.
  fields:
    address:
      name: Bluetooth address
      description: Bluetooth MAC address to listen to.
      required: true
      example: A4:C1:38:60:7E:8E
      selector:
        text:
    duration:
      name: Duration
      description: >
        Number of seconds to keep the notification listener open. The service
        caps this at 300 seconds.
      required: false
      default: 60
      selector:
        number:
          min: 1
          max: 300
          mode: box
